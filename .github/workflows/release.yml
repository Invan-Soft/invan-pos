name: Release Windows Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from pubspec.yaml
        id: version
        shell: pwsh
        run: |
          $line = (Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$').Matches.Groups[1].Value.Trim()
          echo "full=$line" >> $env:GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.3'
          cache: true

      - name: Flutter info
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: |
          flutter build windows --release `
            --dart-define=TELEGRAM_BOT_TOKEN="${{ secrets.TELEGRAM_BOT_TOKEN }}" `
            --dart-define=TELEGRAM_CHANNEL_ID="${{ secrets.TELEGRAM_CHANNEL_ID }}" `
            --dart-define=FISCAL_API_TOKEN="${{ secrets.FISCAL_API_TOKEN }}"

      - name: Compile installer with Inno Setup
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ steps.version.outputs.full }}" `
            installer.iss

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: invan-pos-${{ steps.version.outputs.full }}
          path: installers/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installers/*.exe
          generate_release_notes: true
          name: ${{ steps.version.outputs.full }}
